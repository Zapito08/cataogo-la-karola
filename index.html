<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Arepas La Karola</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫓</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --rojo: #d32f2f; --amarillo: #ffc107; --azul: #1d4ed8; }
        body { font-family: 'Montserrat', sans-serif; background-color: #fdfaf3; scroll-behavior: smooth; }
        .font-brand { font-family: 'Bangers', cursive; letter-spacing: 1.5px; }
        .bg-pattern { background-color: #fdfaf3; background-image: linear-gradient(#f4f1ea 2px, transparent 2px), linear-gradient(90deg, #f4f1ea 2px, transparent 2px); background-size: 40px 40px; }
        .hero-gradient { background: linear-gradient(rgba(211, 47, 47, 0.95), rgba(183, 28, 28, 0.98)), url('https://www.transparenttextures.com/patterns/wood-pattern.png'); position: relative; }
        .arepa-logo-wrapper { background-color: white; display: inline-flex; align-items: center; justify-content: center; padding: 6px; margin-bottom: 1rem; border-radius: 50%; box-shadow: 0 4px 6px rgba(0,0,0,0.1), 0 0 0 6px var(--amarillo), 0 0 0 12px white, 0 10px 25px rgba(0,0,0,0.3); transition: transform 0.3s ease; }
        .card-shred { clip-path: polygon(100% 0%, 100% 96%, 96% 100%, 4% 100%, 0% 96%, 0% 0%); transition: all 0.2s ease; }
        .category-btn.active { background-color: var(--amarillo); color: var(--rojo); font-weight: 900; border-color: var(--rojo); transform: scale(1.05) rotate(-2deg); box-shadow: 3px 3px 0px var(--rojo); }
        
        /* Nueva animación suave para la alerta */
        @keyframes toastIn {
            0% { transform: translateY(-20px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .toast-active { animation: toastIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards; }
    </style>
    <style>
        /* Animación para el error de selección */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .shake-error { animation: shake 0.5s ease-in-out; }

        /* Animación para el botón flotante del carrito */
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .anim-pop { animation: pop 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-pattern pb-32">

    <header class="hero-gradient text-white pt-10 pb-20 px-4 md:px-8 text-center shadow-2xl border-b-8 border-yellow-400">
        <!-- Botón Compartir -->
        <button onclick="compartirCatalogo()" class="absolute top-4 right-4 bg-white/10 hover:bg-white/30 p-3 rounded-full backdrop-blur-sm transition-all text-white border border-white/20 shadow-lg group z-20" title="Compartir catálogo">
            <svg class="w-6 h-6 group-hover:rotate-12 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path>
            </svg>
        </button>

        <div class="max-w-3xl mx-auto">
            <div class="arepa-logo-wrapper relative z-10">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTWOAJ0SRvvZmTInxRD_YJQee31ZFacXGpzeQ&s" alt="Logo Arepas La Karola" class="w-32 h-32 md:w-44 md:h-44 object-cover rounded-full bg-white">
            </div>
            <h1 class="font-brand text-5xl md:text-7xl mb-2 drop-shadow-[3px_3px_0px_rgba(0,0,0,0.6)] uppercase">Arepas La Karola</h1>
            <div class="inline-block bg-blue-700 text-white font-black px-5 py-1.5 rounded-md transform rotate-1 text-xs md:text-sm shadow-lg mb-3 uppercase tracking-widest">El sabor del maíz</div>
            <p class="font-medium text-red-50 italic opacity-90">"Del campo a su mesa con amor y tradición"</p>
        </div>
    </header>

    <div class="sticky top-4 z-40 max-w-4xl mx-auto px-4 -mt-8 mb-10 space-y-4">
        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-3">
            <!-- Buscador -->
            <div class="relative mb-3">
                <input type="text" id="busqueda" oninput="ejecutarFiltros()" 
                    placeholder="¿Qué se te antoja hoy? (ej. empanadas, chorizo...)" 
                    class="w-full p-3 pl-10 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-yellow-400 outline-none transition-all">
                <svg class="w-5 h-5 text-gray-400 absolute left-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>
            <!-- Categorías -->
            <div class="flex flex-wrap justify-center gap-2 items-center">
                <button onclick="cambiarCategoria('Todas', this)" class="category-btn active px-4 py-2 bg-white border-2 rounded-xl text-[10px] md:text-[11px] font-bold uppercase">Todas</button>
                <button onclick="cambiarCategoria('Arepas', this)" class="category-btn px-4 py-2 bg-white border-2 rounded-xl text-[10px] md:text-[11px] font-bold uppercase">Arepas</button>
                <button onclick="cambiarCategoria('Snacks', this)" class="category-btn px-4 py-2 bg-white border-2 rounded-xl text-[10px] md:text-[11px] font-bold uppercase">Snacks</button>
                <button onclick="cambiarCategoria('Cárnicos', this)" class="category-btn px-4 py-2 bg-white border-2 rounded-xl text-[10px] md:text-[11px] font-bold uppercase">Cárnicos</button>
                <button onclick="cambiarCategoria('Panadería', this)" class="category-btn px-4 py-2 bg-white border-2 rounded-xl text-[10px] md:text-[11px] font-bold uppercase">Panadería</button>
                <button onclick="cambiarCategoria('Otros', this)" class="category-btn px-4 py-2 bg-white border-2 rounded-xl text-[10px] md:text-[11px] font-bold uppercase">Otros</button>
            </div>
        </div>
    </div>

    <main id="catalogo" class="max-w-7xl mx-auto px-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></main>

    <div id="cart-modal" class="fixed inset-0 bg-black/70 z-50 hidden flex-col justify-end sm:justify-center items-center backdrop-blur-sm">
        <div class="bg-white w-full sm:w-[480px] max-h-[90vh] rounded-t-3xl sm:rounded-3xl shadow-2xl flex flex-col overflow-hidden">
            <div class="bg-red-700 text-white p-5 flex justify-between items-center">
                <h2 class="font-brand text-2xl tracking-wide">Tu Pedido</h2>
                <button onclick="toggleCart()" class="text-3xl hover:text-yellow-400 transition-colors">&times;</button>
            </div>
            
            <div id="cart-items" class="p-4 overflow-y-auto flex-1 bg-gray-50 space-y-3"></div>

            <div class="p-6 border-t bg-white">
                <div class="mb-4 p-3 bg-blue-50 rounded-xl border border-blue-100">
                    <p class="text-[10px] font-bold text-blue-800 uppercase mb-2 text-center">📍 Dirección de Entrega</p>
                    
                    <div class="relative mb-3">
                        <div class="flex gap-2 mt-1">
                            <input type="text" id="direccion-manual" 
                                onkeypress="if(event.key === 'Enter') calcularEnvioManual()"
                                placeholder="Escribe tu dirección exacta y señas..." 
                                class="w-full p-3 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-blue-400 outline-none">
                            <button onclick="calcularEnvioManual()" class="bg-blue-800 text-white px-4 rounded-xl font-bold text-xs hover:bg-blue-900 shadow-md transition-colors">Buscar</button>
                        </div>
                        <div id="buscando-msg" class="hidden absolute left-2 -bottom-5 text-[10px] text-blue-600 font-bold animate-pulse">Buscando en el mapa...</div>
                    </div>
                    
                    <button id="btn-gps" onclick="obtenerUbicacionGPS()" class="w-full bg-gray-100 text-gray-600 border border-gray-300 px-4 py-2 rounded-xl text-xs font-bold hover:bg-gray-200 transition-all flex items-center justify-center gap-2 mb-2">
                        📍 O usar mi ubicación GPS actual
                    </button>
                    
                    <p id="error-direccion" class="text-[10px] text-red-600 font-bold mt-2 text-center hidden"></p>

                    <div id="info-envio" class="hidden mt-3 p-2 bg-white rounded-lg text-center text-xs font-bold text-gray-800 border border-blue-200">
                        Distancia: <span id="txt-distancia" class="text-blue-600">0</span> km | Envío: <span id="txt-envio" class="text-red-600">₡0</span>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-5">
                    <span class="font-bold text-gray-400 text-xs uppercase">Total Final:</span>
                    <span id="cart-total" class="font-black text-2xl text-red-700">₡0</span>
                </div>
                <button onclick="enviarPedidoWhatsApp()" class="w-full bg-[#25D366] text-white font-black py-4 rounded-2xl flex items-center justify-center gap-3 shadow-lg hover:bg-green-600 transition-all active:scale-95">
                    Confirmar por WhatsApp
                </button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-6 left-0 right-0 px-4 z-40 pointer-events-none">
        <button id="cart-float-btn" onclick="toggleCart()" class="max-w-lg mx-auto flex items-center justify-between bg-red-700 text-white p-4 rounded-2xl border-2 border-yellow-400 pointer-events-auto hidden shadow-2xl transition-transform hover:scale-105 active:scale-95">
            <div class="flex items-center gap-4">
                <div class="bg-yellow-400 text-red-900 w-10 h-10 rounded-full flex items-center justify-center font-black" id="cart-count">0</div>
                <span class="font-black uppercase text-sm">Ver pedido</span>
            </div>
            <span class="font-black text-xl" id="cart-float-total">₡0</span>
        </button>
    </div>

    <div id="toast-container" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 pointer-events-none flex flex-col gap-2"></div>

    <script>
        const WHATSAPP_NUM = "50660891318";
        const LAT_KAROLA = 9.9965;
        const LON_KAROLA = -84.0957;

        let carrito = [];
        let costoEnvio = 0;
        let kmDistancia = 0;
        let requiereCoordinar = false;
        let categoriaActual = 'Todas';

        // Base de datos de productos con OPCIONES (opc)
        const productos = [
            { id: 1, n: "Arepas Blancas o Amarillas", p: 1300, c: "5 unds", cat: "Arepas", d: "Maíz cascado natural", opc: ["Blancas", "Amarillas"] },
            { id: 2, n: "Arepas Rellenas Mozzarella", p: 3500, c: "4 unds", cat: "Arepas", d: "Mozzarella y queso semi duro" },
            { id: 3, n: "Arepas de Chocolo", p: 4500, c: "5 unds", cat: "Arepas", d: "Sabor dulce de la casa" },
            { id: 4, n: "Arepas Rellenas Mini Mozzarella", p: 3800, c: "5 unds", cat: "Arepas", d: "Ideales para boquitas" },
            { id: 5, n: "Arepas de Yuca con Queso", p: 2800, c: "5 unds", cat: "Arepas", d: "Masa suave de yuca" },
            { id: 6, n: "Arepitas para Asados", p: 1300, c: "10 unds", cat: "Arepas", d: "Redondas, listas para el asador" },
            { id: 7, n: "Arepas para Rellenar", p: 1500, c: "5 unds", cat: "Arepas", d: "Rellénelas a su gusto en casa" },
            { id: 8, n: "Arepas Aliñadas con Queso", p: 2500, c: "5 unds", cat: "Arepas", d: "Maíz amarillo aliñado" },
            { id: 9, n: "Arepas Ultra Delgadas", p: 1300, c: "5 unds", cat: "Arepas", d: "Blancas o amarillas, muy crujientes", opc: ["Blancas", "Amarillas"] },
            { id: 10, n: "Empanadas Grandes", p: 7000, c: "10 unds", cat: "Snacks", d: "Carne, Pollo, Queso, Hawaiana, Frijol, Papa", opc: ["Carne", "Pollo", "Queso", "Hawaiana", "Frijol", "Papa"] },
            { id: 11, n: "Empanadas Pequeñas", p: 7000, c: "12 unds", cat: "Snacks", d: "Carne o Pollo", opc: ["Carne", "Pollo"] },
            { id: 12, n: "Palitos de Queso Hojaldre", p: 4500, c: "10 unds", cat: "Snacks", d: "Listos para hornear o freír" },
            { id: 13, n: "Bandeja de Buñuelos", p: 4500, c: "10 unds", cat: "Snacks", d: "Elaboración tradicional" },
            { id: 14, n: "Tamales Santarrosanos", p: 5800, c: "Und", cat: "Snacks", d: "Por encargo (Cada 15 días)" },
            { id: 15, n: "Chorizos Paisas", p: 7000, c: "10 unds", cat: "Cárnicos", d: "El original sabor colombiano" },
            { id: 16, n: "Morcilla", p: 7800, c: "Kilo", cat: "Cárnicos", d: "Fresca y bien aliñada" },
            { id: 17, n: "Bofe", p: 6000, c: "Kilo", cat: "Cárnicos", d: "Calidad garantizada" },
            { id: 18, n: "Chunchullo", p: 6000, c: "Kilo", cat: "Cárnicos", d: "Para asar y disfrutar" },
            { id: 19, n: "Chicharrón Colombiano", p: 7000, c: "Kilo", cat: "Cárnicos", d: "Ya va cortadito y listo" },
            { id: 20, n: "Lechona (Porción)", p: 5700, c: "Porción", cat: "Cárnicos", d: "Por encargo" },
            { id: 21, n: "Almojábanas", p: 3000, c: "6 unds", cat: "Panadería", d: "Libres de gluten" },
            { id: 22, n: "Pan de bonos", p: 4500, c: "10 unds", cat: "Panadería", d: "Para freidora de aire" },
            { id: 23, n: "Tostadas Colombianas", p: 2200, c: "Pqt", cat: "Panadería", d: "Crujientes" },
            { id: 24, n: "Pandequeso Congelado", p: 4500, c: "10 unds", cat: "Panadería", d: "Listo para el horno" },
            { id: 25, n: "Quesito de la Casa", p: 6800, c: "Libra", cat: "Otros", d: "Fresco, ideal para arepas" },
            { id: 26, n: "Masa Prep. para Buñuelos", p: 6000, c: "Kilo", cat: "Otros", d: "Lista para moldear y freír" },
            { id: 27, n: "Ají para Empanadas", p: 3000, c: "450gr", cat: "Otros", d: "El acompañante perfecto" }
        ];

        // Muestra una notificación temporal al agregar al carrito
        function mostrarToast(productoNom) {
            const toast = document.createElement('div');
            toast.className = 'bg-white border-2 border-green-500 text-gray-800 px-5 py-3 rounded-2xl shadow-2xl text-xs font-bold toast-active flex items-center gap-3 min-w-[250px]';
            toast.innerHTML = `
                <div class="bg-green-500 text-white p-1 rounded-full">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <div>
                    <p class="text-green-600 uppercase text-[9px] font-black tracking-tighter">¡Añadido al pedido!</p>
                    <p class="text-gray-700">${productoNom}</p>
                </div>
            `;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = '0.5s'; setTimeout(() => toast.remove(), 500); }, 2500);
        }

        // Nueva función de agregado que lee la opción directamente de la tarjeta
        function agregarDesdeTarjeta(id, n, p) {
            const container = document.getElementById(`chips-opcion-${id}`);
            let opcionElegida = null;
            
            if (container) {
                const selectedBtn = container.querySelector('button[data-selected="true"]');
                if (selectedBtn) {
                    opcionElegida = selectedBtn.dataset.value;
                } else {
                    // Feedback visual si no han seleccionado nada
                    container.classList.add('shake-error');
                    setTimeout(() => {
                        container.classList.remove('shake-error');
                    }, 500);
                    return; // Detenemos la función para que no agregue nada
                }
            }

            agregarAlCarrito(id, n, p, opcionElegida);
            mostrarToast(n);
            
            // Deseleccionar después de agregar para el siguiente
            if(container) {
                container.querySelectorAll('button').forEach(b => {
                    b.classList.replace('bg-blue-600', 'bg-gray-100');
                    b.classList.replace('text-white', 'text-gray-600');
                    b.classList.remove('border-blue-600', 'scale-105');
                    delete b.dataset.selected;
                });
            }
        }

        function seleccionarSabor(productId, sabor, btn) {
            const container = document.getElementById(`chips-opcion-${productId}`);
            container.querySelectorAll('button').forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white', 'border-blue-600', 'scale-105');
                b.classList.add('bg-gray-100', 'text-gray-600', 'border-transparent');
                delete b.dataset.selected;
            });
            btn.classList.replace('bg-gray-100', 'bg-blue-600');
            btn.classList.replace('text-gray-600', 'text-white');
            btn.classList.add('border-blue-600', 'scale-105');
            btn.dataset.selected = "true";
        }

        function agregarAlCarrito(id, n, p, opcion = null) {
            // Se crea un ID único si tiene opción (ej: "10-Carne" y "10-Pollo" son separados)
            const cartId = opcion ? `${id}-${opcion}` : `${id}`;
            const itemExistente = carrito.find(i => i.cartId === cartId);
            
            if (itemExistente) {
                itemExistente.cantidad += 1;
            } else {
                carrito.push({ cartId, id, n, p, cantidad: 1, opcion });
            }
            
            actualizarUI();
            
            const btn = document.getElementById('cart-float-btn');
            btn.classList.remove('anim-pop');
            void btn.offsetWidth; // Trigger reflow to restart animation
            btn.classList.add('anim-pop');
        }

        function quitarDelCarrito(cartId) {
            const idx = carrito.findIndex(i => i.cartId === cartId);
            if (idx > -1) {
                carrito[idx].cantidad > 1 ? carrito[idx].cantidad-- : carrito.splice(idx, 1);
            }
            actualizarUI();
        }

        function actualizarUI() {
            const subtotal = carrito.reduce((s, i) => s + (i.p * i.cantidad), 0);
            let totalFinal = subtotal + costoEnvio;
            const totalItems = carrito.reduce((s, i) => s + i.cantidad, 0);
            
            document.getElementById('cart-count').innerText = totalItems;
            
            const textoTotal = requiereCoordinar ? `₡${totalFinal.toLocaleString()} + Envío` : `₡${totalFinal.toLocaleString()}`;
            
            document.getElementById('cart-float-total').innerText = totalFinal > 0 ? `₡${totalFinal.toLocaleString()}` : "₡0";
            document.getElementById('cart-total').innerText = textoTotal;
            
            const btn = document.getElementById('cart-float-btn');
            totalItems > 0 ? btn.classList.remove('hidden') : btn.classList.add('hidden');

            if (carrito.length === 0) {
                document.getElementById('cart-items').innerHTML = `
                    <div class="py-10 text-center">
                        <p class="text-3xl mb-2">🛒</p>
                        <p class="text-gray-400 font-bold text-sm uppercase">Tu carrito está vacío</p>
                    </div>`;
                return;
            }

            document.getElementById('cart-items').innerHTML = carrito.map(i => {
                const nombreOpcion = i.opcion ? `${i.n} <span class="block text-[10px] text-blue-600 font-black mt-0.5 bg-blue-50 px-1.5 py-0.5 rounded w-max inline-block">${i.opcion}</span>` : i.n;
                
                return `
                <div class="bg-white p-3 rounded-xl border flex justify-between items-center shadow-sm">
                    <div class="flex-1 pr-2">
                        <h4 class="font-bold text-xs uppercase leading-tight">${nombreOpcion}</h4>
                        <p class="text-red-600 font-black mt-1">₡${(i.p * i.cantidad).toLocaleString()}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="quitarDelCarrito('${i.cartId}')" class="w-8 h-8 bg-gray-100 rounded text-red-600 font-black active:scale-95 transition-all">-</button>
                        <span class="font-bold text-xs w-4 text-center">${i.cantidad}</span>
                        <button onclick="agregarAlCarrito(${i.id}, '${i.n}', ${i.p}, ${i.opcion ? `'${i.opcion}'` : 'null'})" class="w-8 h-8 bg-gray-100 rounded text-green-600 font-black active:scale-95 transition-all">+</button>
                    </div>
                </div>
            `}).join('');
        }

        function createCardHTML(item) {
            return `
                <div class="card-shred bg-white border-2 shadow-lg flex flex-col h-full rounded-b-lg overflow-hidden transition-all hover:shadow-xl group">
                    <div class="bg-red-700 h-1.5 w-full group-hover:bg-yellow-400 transition-colors"></div>
                    <div class="p-5 flex flex-col flex-grow">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-blue-700 font-black text-[10px] uppercase bg-blue-50 px-2 py-1 rounded-md border border-blue-100">${item.cat}</span>
                            <span class="bg-yellow-100 text-yellow-800 text-[10px] font-black px-2 py-1 rounded-md italic">${item.c}</span>
                        </div>
                        <h3 class="font-bold text-gray-900 text-sm uppercase mb-1 leading-tight">${item.n}</h3>
                        <p class="text-gray-500 text-[11px] italic mb-4 line-clamp-2">"${item.d}"</p>
                        
                        <div class="mt-auto pt-4 border-t border-dashed border-gray-200">
                            ${item.opc ? `
                                <p class="text-[9px] font-black text-gray-400 uppercase mb-2 tracking-tighter">Selecciona un sabor:</p>
                                <div id="chips-opcion-${item.id}" class="flex flex-wrap gap-1.5 mb-4">
                                    ${item.opc.map(opcion => `
                                        <button onclick="seleccionarSabor(${item.id}, '${opcion}', this)" data-value="${opcion}" class="flex-grow bg-gray-100 text-gray-600 border-2 border-transparent px-3 py-2 rounded-lg text-[10px] font-bold transition-all active:scale-90 hover:border-blue-200">
                                            ${opcion}
                                        </button>
                                    `).join('')}
                                </div>
                            ` : ''} 
                            
                            <div class="flex flex-col gap-3">
                                <div class="flex justify-between items-baseline px-1">
                                    <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Precio</span>
                                    <span class="text-xl font-black text-red-700">₡${item.p.toLocaleString()}</span>
                                </div>
                                <button onclick="agregarDesdeTarjeta(${item.id}, '${item.n}', ${item.p})"

                    </div>
                </div>
            `;
        }

        function renderCatalogo(items) {
            const contenedor = document.getElementById('catalogo');
            if (items.length === 0) {
                contenedor.innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <p class="text-gray-400 font-bold uppercase">No encontramos productos que coincidan...</p>
                    </div>`;
                return;
            }
            contenedor.innerHTML = items.map(item => createCardHTML(item)).join('');
        }

        // --- Funciones de Geolocalización (Sin cambios) ---
        async function calcularEnvioManual() {
            const dir = document.getElementById('direccion-manual').value.trim();
            const errorMsg = document.getElementById('error-direccion');
            if (dir.length < 4) { alert("Por favor escribe una dirección válida."); return; }
            
            document.getElementById('buscando-msg').classList.remove('hidden');
            errorMsg.classList.add('hidden');
            
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(dir + ", Costa Rica")}&limit=1`);
                const data = await response.json();
                
                if (data.length > 0) {
                    procesarEnvio(parseFloat(data[0].lat), parseFloat(data[0].lon));
                } else {
                    errorMsg.innerText = "❌ No pudimos calcular la distancia exacta con esas señas. El encargado te dirá el costo por WhatsApp.";
                    errorMsg.classList.remove('hidden');
                    costoEnvio = 0; kmDistancia = 0; requiereCoordinar = true;
                    document.getElementById('info-envio').classList.add('hidden');
                    actualizarUI();
                }
            } catch (error) { console.error(error); } 
            finally { document.getElementById('buscando-msg').classList.add('hidden'); }
        }

        function obtenerUbicacionGPS() {
            if (!navigator.geolocation) return alert("Tu navegador no soporta GPS.");
            const btnGps = document.getElementById('btn-gps');
            const textoOriginal = btnGps.innerHTML;
            btnGps.innerHTML = 'Calculando... ⏳';
            navigator.geolocation.getCurrentPosition(pos => {
                procesarEnvio(pos.coords.latitude, pos.coords.longitude);
                btnGps.innerHTML = textoOriginal;
            }, () => {
                btnGps.innerHTML = textoOriginal;
                alert("No pudimos acceder a tu GPS. Por favor, asegúrate de escribir tu dirección arriba.");
            });
        }

        function procesarEnvio(latB, lonB) {
            kmDistancia = calcularDistancia(LAT_KAROLA, LON_KAROLA, latB, lonB);
            if (kmDistancia <= 8) {
                costoEnvio = 1500; requiereCoordinar = false; document.getElementById('txt-envio').innerText = `₡1,500`;
            } else {
                costoEnvio = 0; requiereCoordinar = true; document.getElementById('txt-envio').innerText = "El encargado te dirá el costo";
            }
            document.getElementById('info-envio').classList.remove('hidden');
            document.getElementById('txt-distancia').innerText = kmDistancia.toFixed(1);
            document.getElementById('error-direccion').classList.add('hidden');
            actualizarUI();
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function enviarPedidoWhatsApp() {
            if (carrito.length === 0) return;
            const direccion = document.getElementById('direccion-manual').value.trim();
            if (direccion === "") {
                alert("Por favor, escribe tu dirección de entrega antes de confirmar el pedido.");
                document.getElementById('direccion-manual').focus(); return;
            }
            
            let msg = "¡Hola *Arepas La Karola*! 👋 Mi pedido:\n\n";
            carrito.forEach(i => {
                const nomText = i.opcion ? `${i.n} (${i.opcion})` : i.n;
                msg += `▪️ ${i.cantidad}x ${nomText} - ₡${(i.p * i.cantidad).toLocaleString()}\n`;
            });
            
            if (kmDistancia > 0) {
                msg += requiereCoordinar ? `\n🚚 *Envío:* El encargado te dirá el costo (${kmDistancia.toFixed(1)} km)` : `\n🚚 *Envío:* ₡${costoEnvio.toLocaleString()} (${kmDistancia.toFixed(1)} km)`;
            } else {
                msg += `\n🚚 *Envío:* El encargado te dirá el costo`;
            }
            msg += `\n🏠 *Dirección/Señas:* ${direccion}`;
            
            const subtotal = carrito.reduce((s,i)=>s+(i.p*i.cantidad),0);
            const totalFinal = subtotal + costoEnvio;
            
            msg += `\n\n*Total a pagar: ₡${totalFinal.toLocaleString()}*`;
            if (requiereCoordinar) msg += ` *(+ Costo de envío)*`;
            
            window.open(`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        async function compartirCatalogo() {
            const shareData = {
                title: 'Arepas La Karola | Catálogo Digital',
                text: '¡Mira los deliciosos productos de Arepas La Karola! 🫓🇨🇴',
                url: window.location.href
            };

            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    await navigator.clipboard.writeText(window.location.href);
                    mostrarToast("¡Enlace copiado al portapapeles!");
                }
            } catch (err) {
                if (err.name !== 'AbortError') console.error('Error al compartir:', err);
            }
        }

        function cambiarCategoria(cat, btn) {
            categoriaActual = cat;
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            ejecutarFiltros();
        }

        function ejecutarFiltros() {
            const texto = document.getElementById('busqueda').value.toLowerCase().trim();
            
            // No hay sección de ofertas, así que no hay que ocultarla/mostrarla
            // const containerOfertas = document.getElementById('ofertas-container');
            
            const filtrados = productos.filter(p => {
                const cumpleCategoria = (categoriaActual === 'Todas' || p.cat === categoriaActual);
                const cumpleBusqueda = (p.n.toLowerCase().includes(texto) || p.d.toLowerCase().includes(texto));
                return cumpleCategoria && cumpleBusqueda;
            });
            
            renderCatalogo(filtrados);
        }

        function toggleCart() {
            const m = document.getElementById('cart-modal');
            m.classList.contains('hidden') ? m.classList.replace('hidden', 'flex') : m.classList.replace('flex', 'hidden');
        }

        renderCatalogo(productos);
    </script>

                                            ${opcion}
                                        </button>
                                    `).join('')}
                                </div>
                            ` : ''} 
                            
                            <div class="flex flex-col gap-3">
                                <div class="flex justify-between items-baseline px-1">
                                    <span class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Precio</span>
                                    <span class="text-xl font-black text-red-700">₡${item.p.toLocaleString()}</span>
                                </div>
                                <button onclick="agregarDesdeTarjeta(${item.id}, '${item.n}', ${item.p})" 
                                    class="w-full py-3 bg-red-700 hover:bg-red-800 text-white font-bold rounded-xl transition-all flex items-center justify-center gap-2 text-[11px] uppercase tracking-wide shadow-md active:scale-95">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                                    Añadir al Carrito
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- Funciones de Geolocalización (Sin cambios) ---
        async function calcularEnvioManual() {
            const dir = document.getElementById('direccion-manual').value.trim();
            const errorMsg = document.getElementById('error-direccion');
            if (dir.length < 4) { alert("Por favor escribe una dirección válida."); return; }
            
            document.getElementById('buscando-msg').classList.remove('hidden');
            errorMsg.classList.add('hidden');
            
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(dir + ", Costa Rica")}&limit=1`);
                const data = await response.json();
                
                if (data.length > 0) {
                    procesarEnvio(parseFloat(data[0].lat), parseFloat(data[0].lon));
                } else {
                    errorMsg.innerText = "❌ No pudimos calcular la distancia exacta con esas señas. El encargado te dirá el costo por WhatsApp.";
                    errorMsg.classList.remove('hidden');
                    costoEnvio = 0; kmDistancia = 0; requiereCoordinar = true;
                    document.getElementById('info-envio').classList.add('hidden');
                    actualizarUI();
                }
            } catch (error) { console.error(error); } 
            finally { document.getElementById('buscando-msg').classList.add('hidden'); }
        }

        function obtenerUbicacionGPS() {
            if (!navigator.geolocation) return alert("Tu navegador no soporta GPS.");
            const btnGps = document.getElementById('btn-gps');
            const textoOriginal = btnGps.innerHTML;
            btnGps.innerHTML = 'Calculando... ⏳';
            navigator.geolocation.getCurrentPosition(pos => {
                procesarEnvio(pos.coords.latitude, pos.coords.longitude);
                btnGps.innerHTML = textoOriginal;
            }, () => {
                btnGps.innerHTML = textoOriginal;
                alert("No pudimos acceder a tu GPS. Por favor, asegúrate de escribir tu dirección arriba.");
            });
        }

        function procesarEnvio(latB, lonB) {
            kmDistancia = calcularDistancia(LAT_KAROLA, LON_KAROLA, latB, lonB);
            if (kmDistancia <= 8) {
                costoEnvio = 1500; requiereCoordinar = false; document.getElementById('txt-envio').innerText = `₡1,500`;
            } else {
                costoEnvio = 0; requiereCoordinar = true; document.getElementById('txt-envio').innerText = "El encargado te dirá el costo";
            }
            document.getElementById('info-envio').classList.remove('hidden');
            document.getElementById('txt-distancia').innerText = kmDistancia.toFixed(1);
            document.getElementById('error-direccion').classList.add('hidden');
            actualizarUI();
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function enviarPedidoWhatsApp() {
            if (carrito.length === 0) return;
            const direccion = document.getElementById('direccion-manual').value.trim();
            if (direccion === "") {
                alert("Por favor, escribe tu dirección de entrega antes de confirmar el pedido.");
                document.getElementById('direccion-manual').focus(); return;
            }
            
            let msg = "¡Hola *Arepas La Karola*! 👋 Mi pedido:\n\n";
            carrito.forEach(i => {
                const nomText = i.opcion ? `${i.n} (${i.opcion})` : i.n;
                msg += `▪️ ${i.cantidad}x ${nomText} - ₡${(i.p * i.cantidad).toLocaleString()}\n`;
            });
            
            if (kmDistancia > 0) {
                msg += requiereCoordinar ? `\n🚚 *Envío:* El encargado te dirá el costo (${kmDistancia.toFixed(1)} km)` : `\n🚚 *Envío:* ₡${costoEnvio.toLocaleString()} (${kmDistancia.toFixed(1)} km)`;
            } else {
                msg += `\n🚚 *Envío:* El encargado te dirá el costo`;
            }
            msg += `\n🏠 *Dirección/Señas:* ${direccion}`;
            
            const subtotal = carrito.reduce((s,i)=>s+(i.p*i.cantidad),0);
            const totalFinal = subtotal + costoEnvio;
            
            msg += `\n\n*Total a pagar: ₡${totalFinal.toLocaleString()}*`;
            if (requiereCoordinar) msg += ` *(+ Costo de envío)*`;
            
            window.open(`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        async function compartirCatalogo() {
            const shareData = {
                title: 'Arepas La Karola | Catálogo Digital',
                text: '¡Mira los deliciosos productos de Arepas La Karola! 🫓🇨🇴',
                url: window.location.href
            };

            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    await navigator.clipboard.writeText(window.location.href);
                    mostrarToast("¡Enlace copiado al portapapeles!");
                }
            } catch (err) {
                if (err.name !== 'AbortError') console.error('Error al compartir:', err);
            }
        }

        function cambiarCategoria(cat, btn) {
            categoriaActual = cat;
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            ejecutarFiltros();
        }

        function ejecutarFiltros() {
            const texto = document.getElementById('busqueda').value.toLowerCase().trim();
            
            const filtrados = productos.filter(p => {
                const cumpleCategoria = (categoriaActual === 'Todas' || p.cat === categoriaActual);
                const cumpleBusqueda = (p.n.toLowerCase().includes(texto) || p.d.toLowerCase().includes(texto));
                return cumpleCategoria && cumpleBusqueda;
            });
            
            renderCatalogo(filtrados);
        }

        function toggleCart() {
            const m = document.getElementById('cart-modal');
            m.classList.contains('hidden') ? m.classList.replace('hidden', 'flex') : m.classList.replace('flex', 'hidden');
        }

        renderCatalogo(productos);
    </script>
