<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Arepas La Karola</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫓</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --rojo: #d32f2f; --amarillo: #ffc107; --azul: #1d4ed8; }
        body { font-family: 'Montserrat', sans-serif; background-color: #fdfaf3; scroll-behavior: smooth; }
        .font-brand { font-family: 'Bangers', cursive; letter-spacing: 1.5px; }
        .bg-pattern { background-color: #fdfaf3; background-image: linear-gradient(#f4f1ea 2px, transparent 2px), linear-gradient(90deg, #f4f1ea 2px, transparent 2px); background-size: 40px 40px; }
        .hero-gradient { background: linear-gradient(rgba(211, 47, 47, 0.95), rgba(183, 28, 28, 0.98)), url('https://www.transparenttextures.com/patterns/wood-pattern.png'); position: relative; }
        .arepa-logo-wrapper { background-color: white; display: inline-flex; align-items: center; justify-content: center; padding: 6px; margin-bottom: 1rem; border-radius: 50%; box-shadow: 0 4px 6px rgba(0,0,0,0.1), 0 0 0 6px var(--amarillo), 0 0 0 12px white, 0 10px 25px rgba(0,0,0,0.3); transition: transform 0.3s ease; }
        .card-shred { clip-path: polygon(100% 0%, 100% 96%, 96% 100%, 4% 100%, 0% 96%, 0% 0%); transition: all 0.2s ease; }
        .category-btn.active { background-color: var(--amarillo); color: var(--rojo); font-weight: 900; border-color: var(--rojo); transform: scale(1.05) rotate(-2deg); box-shadow: 3px 3px 0px var(--rojo); }
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .anim-pop { animation: pop 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-pattern pb-32">

    <header class="hero-gradient text-white pt-10 pb-20 px-4 md:px-8 text-center shadow-2xl border-b-8 border-yellow-400">
        <div class="max-w-3xl mx-auto">
            <div class="arepa-logo-wrapper relative z-10">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTWOAJ0SRvvZmTInxRD_YJQee31ZFacXGpzeQ&s" alt="Logo Arepas La Karola" class="w-32 h-32 md:w-44 md:h-44 object-cover rounded-full bg-white">
            </div>
            <h1 class="font-brand text-5xl md:text-7xl mb-2 drop-shadow-[3px_3px_0px_rgba(0,0,0,0.6)] uppercase">Arepas La Karola</h1>
            <div class="inline-block bg-blue-700 text-white font-black px-5 py-1.5 rounded-md transform rotate-1 text-xs md:text-sm shadow-lg mb-3 uppercase tracking-widest">El sabor del maíz</div>
            <p class="font-medium text-red-50 italic opacity-90">"Del campo a su mesa con amor y tradición"</p>
        </div>
    </header>

    <div class="sticky top-4 z-40 max-w-4xl mx-auto px-4 -mt-8 mb-10">
        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-2 text-center">
            <div class="flex flex-wrap justify-center gap-2 py-2 items-center">
                <button onclick="filtrar('Todas', this)" class="category-btn active px-4 py-2 bg-white border-2 rounded-xl text-[11px] font-bold uppercase transition-all">Todas</button>
                <button onclick="filtrar('Arepas', this)" class="category-btn px-4 py-2 bg-white border-2 rounded-xl text-[11px] font-bold uppercase transition-all">Arepas</button>
                <button onclick="filtrar('Snacks', this)" class="category-btn px-4 py-2 bg-white border-2 rounded-xl text-[11px] font-bold uppercase transition-all">Snacks</button>
                <button onclick="filtrar('Cárnicos', this)" class="category-btn px-4 py-2 bg-white border-2 rounded-xl text-[11px] font-bold uppercase transition-all">Cárnicos</button>
                <button onclick="filtrar('Panadería', this)" class="category-btn px-4 py-2 bg-white border-2 rounded-xl text-[11px] font-bold uppercase transition-all">Panadería</button>
                <button onclick="filtrar('Otros', this)" class="category-btn px-4 py-2 bg-white border-2 rounded-xl text-[11px] font-bold uppercase transition-all">Otros</button>
            </div>
        </div>
    </div>

    <main id="catalogo" class="max-w-7xl mx-auto px-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></main>

    <div id="cart-modal" class="fixed inset-0 bg-black/70 z-50 hidden flex-col justify-end sm:justify-center items-center backdrop-blur-sm">
        <div class="bg-white w-full sm:w-[480px] max-h-[90vh] rounded-t-3xl sm:rounded-3xl shadow-2xl flex flex-col overflow-hidden">
            <div class="bg-red-700 text-white p-5 flex justify-between items-center">
                <h2 class="font-brand text-2xl tracking-wide">Tu Pedido</h2>
                <button onclick="toggleCart()" class="text-3xl">&times;</button>
            </div>
            
            <div id="cart-items" class="p-4 overflow-y-auto flex-1 bg-gray-50 space-y-3"></div>

            <div class="p-6 border-t bg-white">
                <div class="mb-4 p-3 bg-blue-50 rounded-xl border border-blue-100">
                    <p class="text-[10px] font-bold text-blue-800 uppercase mb-2 text-center">📍 Ubicación de Entrega</p>
                    
                    <button onclick="obtenerUbicacionGPS()" class="w-full bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-blue-700 transition-all mb-3 shadow-sm">
                        📍 Usar mi ubicación GPS actual
                    </button>

                    <div class="relative">
                        <label class="text-[9px] font-bold text-gray-400 uppercase ml-1">O escribe tu dirección en Costa Rica:</label>
                        <div class="flex gap-2 mt-1">
                            <input type="text" id="direccion-manual" 
                                onkeypress="if(event.key === 'Enter') calcularEnvioManual()"
                                placeholder="Ej: Heredia Centro..." 
                                class="w-full p-3 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-blue-400 outline-none">
                            <button onclick="calcularEnvioManual()" class="bg-blue-800 text-white px-4 rounded-xl font-bold text-xs hover:bg-blue-900 shadow-md">Buscar</button>
                        </div>
                        <div id="buscando-msg" class="hidden absolute left-2 -bottom-5 text-[10px] text-blue-600 font-bold animate-pulse">Buscando en el mapa...</div>
                    </div>
                    
                    <p id="error-direccion" class="text-[10px] text-red-600 font-bold mt-2 text-center hidden"></p>

                    <div id="info-envio" class="hidden mt-3 p-2 bg-white rounded-lg text-center text-xs font-bold text-gray-600 border border-blue-200">
                        Distancia: <span id="txt-distancia">0</span> km | Envío: <span id="txt-envio">₡0</span>
                    </div>
                </div>

                <div class="flex justify-between items-center mb-5">
                    <span class="font-bold text-gray-400 text-xs uppercase">Total Final:</span>
                    <span id="cart-total" class="font-black text-2xl text-red-700">₡0</span>
                </div>
                <button onclick="enviarPedidoWhatsApp()" class="w-full bg-[#25D366] text-white font-black py-4 rounded-2xl flex items-center justify-center gap-3 shadow-lg hover:bg-green-600 transition-all">
                    Confirmar por WhatsApp
                </button>
            </div>
        </div>
    </div>

    <div class="fixed bottom-6 left-0 right-0 px-4 z-40 pointer-events-none">
        <button id="cart-float-btn" onclick="toggleCart()" class="max-w-lg mx-auto flex items-center justify-between bg-red-700 text-white p-4 rounded-2xl border-2 border-yellow-400 pointer-events-auto hidden shadow-2xl">
            <div class="flex items-center gap-4">
                <div class="bg-yellow-400 text-red-900 w-10 h-10 rounded-full flex items-center justify-center font-black" id="cart-count">0</div>
                <span class="font-black uppercase text-sm">Ver pedido</span>
            </div>
            <span class="font-black text-xl" id="cart-float-total">₡0</span>
        </button>
    </div>

    <script>
        const WHATSAPP_NUM = "50660891318";
        
        // PUNTO A: COORDENADAS EXACTAS SAN PABLO, HEREDIA (40801)
        const LAT_KAROLA = 9.9965;
        const LON_KAROLA = -84.0957;

        let carrito = [];
        let costoEnvio = 0;
        let kmDistancia = 0;
        let requiereCoordinar = false;

        const productos = [
            { id: 1, n: "Arepas Blancas o Amarillas", p: 1300, c: "5 unds", cat: "Arepas", d: "Maíz cascado natural" },
            { id: 2, n: "Arepas Rellenas Mozzarella", p: 3500, c: "4 unds", cat: "Arepas", d: "Mozzarella y queso semi duro" },
            { id: 3, n: "Arepas de Chocolo", p: 4500, c: "5 unds", cat: "Arepas", d: "Sabor dulce de la casa" },
            { id: 4, n: "Arepas Rellenas Mini Mozzarella", p: 3800, c: "5 unds", cat: "Arepas", d: "Ideales para boquitas" },
            { id: 5, n: "Arepas de Yuca con Queso", p: 2800, c: "5 unds", cat: "Arepas", d: "Masa suave de yuca" },
            { id: 6, n: "Arepitas para Asados", p: 1300, c: "10 unds", cat: "Arepas", d: "Redondas, listas para el asador" },
            { id: 7, n: "Arepas para Rellenar", p: 1500, c: "5 unds", cat: "Arepas", d: "Rellénelas a su gusto en casa" },
            { id: 8, n: "Arepas Aliñadas con Queso", p: 2500, c: "5 unds", cat: "Arepas", d: "Maíz amarillo aliñado" },
            { id: 9, n: "Arepas Ultra Delgadas", p: 1300, c: "5 unds", cat: "Arepas", d: "Blancas o amarillas, muy crujientes" },
            { id: 10, n: "Empanadas Grandes", p: 7000, c: "10 unds", cat: "Snacks", d: "Carne, Pollo, Queso, Hawaiana, Frijol, Papa" },
            { id: 11, n: "Empanadas Pequeñas", p: 7000, c: "12 unds", cat: "Snacks", d: "Carne o Pollo" },
            { id: 12, n: "Palitos de Queso Hojaldre", p: 4500, c: "10 unds", cat: "Snacks", d: "Listos para hornear o freír" },
            { id: 13, n: "Bandeja de Buñuelos", p: 4500, c: "10 unds", cat: "Snacks", d: "Elaboración tradicional" },
            { id: 14, n: "Tamales Santarrosanos", p: 5800, c: "Und", cat: "Snacks", d: "Por encargo (Cada 15 días)" },
            { id: 15, n: "Chorizos Paisas", p: 7000, c: "10 unds", cat: "Cárnicos", d: "El original sabor colombiano" },
            { id: 16, n: "Morcilla", p: 7800, c: "Kilo", cat: "Cárnicos", d: "Fresca y bien aliñada" },
            { id: 17, n: "Bofe", p: 6000, c: "Kilo", cat: "Cárnicos", d: "Calidad garantizada" },
            { id: 18, n: "Chunchullo", p: 6000, c: "Kilo", cat: "Cárnicos", d: "Para asar y disfrutar" },
            { id: 19, n: "Chicharrón Colombiano", p: 7000, c: "Kilo", cat: "Cárnicos", d: "Ya va cortadito y listo" },
            { id: 20, n: "Lechona (Porción)", p: 5700, c: "Porción", cat: "Cárnicos", d: "Por encargo" },
            { id: 21, n: "Almojábanas", p: 3000, c: "6 unds", cat: "Panadería", d: "Libres de gluten" },
            { id: 22, n: "Pan de bonos", p: 4500, c: "10 unds", cat: "Panadería", d: "Para freidora de aire" },
            { id: 23, n: "Tostadas Colombianas", p: 2200, c: "Pqt", cat: "Panadería", d: "Crujientes" },
            { id: 24, n: "Pandequeso Congelado", p: 4500, c: "10 unds", cat: "Panadería", d: "Listo para el horno" },
            { id: 25, n: "Quesito de la Casa", p: 6800, c: "Libra", cat: "Otros", d: "Fresco, ideal para arepas" },
            { id: 26, n: "Masa Prep. para Buñuelos", p: 6000, c: "Kilo", cat: "Otros", d: "Lista para moldear y freír" },
            { id: 27, n: "Ají para Empanadas", p: 3000, c: "450gr", cat: "Otros", d: "El acompañante perfecto" }
        ];

        async function calcularEnvioManual() {
            const dir = document.getElementById('direccion-manual').value.trim();
            const errorMsg = document.getElementById('error-direccion');
            if (dir.length < 4) return;
            
            document.getElementById('buscando-msg').classList.remove('hidden');
            errorMsg.classList.add('hidden');
            
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(dir + ", Costa Rica")}&limit=1`);
                const data = await response.json();
                
                if (data.length > 0) {
                    procesarEnvio(parseFloat(data[0].lat), parseFloat(data[0].lon));
                } else {
                    errorMsg.innerText = "❌ No encontramos la distancia exacta. El encargado te dirá el costo por WhatsApp.";
                    errorMsg.classList.remove('hidden');
                    costoEnvio = 0;
                    kmDistancia = 0;
                    requiereCoordinar = true;
                    document.getElementById('info-envio').classList.add('hidden');
                    actualizarUI();
                }
            } catch (error) { 
                console.error(error); 
            } finally { 
                document.getElementById('buscando-msg').classList.add('hidden'); 
            }
        }

        function obtenerUbicacionGPS() {
            if (!navigator.geolocation) return alert("GPS no disponible");
            navigator.geolocation.getCurrentPosition(pos => {
                procesarEnvio(pos.coords.latitude, pos.coords.longitude);
            }, () => alert("No pudimos acceder a tu GPS. Escribe la dirección manualmente."));
        }

        function procesarEnvio(latB, lonB) {
            kmDistancia = calcularDistancia(LAT_KAROLA, LON_KAROLA, latB, lonB);
            
            if (kmDistancia <= 7) {
                costoEnvio = 1500;
                requiereCoordinar = false;
                document.getElementById('txt-envio').innerText = `₡1,500`;
            } else {
                costoEnvio = 0;
                requiereCoordinar = true;
                document.getElementById('txt-envio').innerText = "El encargado te dirá el costo";
            }
            
            document.getElementById('info-envio').classList.remove('hidden');
            document.getElementById('txt-distancia').innerText = kmDistancia.toFixed(1);
            document.getElementById('error-direccion').classList.add('hidden');
            actualizarUI();
        }

        function calcularDistancia(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function agregarAlCarrito(id, n, p) {
            const item = carrito.find(i => i.id === id);
            item ? item.cantidad++ : carrito.push({ id, n, p, cantidad: 1 });
            actualizarUI();
            const btn = document.getElementById('cart-float-btn');
            btn.classList.remove('anim-pop');
            void btn.offsetWidth; btn.classList.add('anim-pop');
        }

        function quitarDelCarrito(id) {
            const idx = carrito.findIndex(i => i.id === id);
            if (idx > -1) {
                carrito[idx].cantidad > 1 ? carrito[idx].cantidad-- : carrito.splice(idx, 1);
            }
            actualizarUI();
        }

        function actualizarUI() {
            const subtotal = carrito.reduce((s, i) => s + (i.p * i.cantidad), 0);
            const totalFinal = subtotal + costoEnvio;
            const totalItems = carrito.reduce((s, i) => s + i.cantidad, 0);
            
            document.getElementById('cart-count').innerText = totalItems;
            
            const textoTotal = requiereCoordinar ? `₡${totalFinal.toLocaleString()} + Envío` : `₡${totalFinal.toLocaleString()}`;
            
            document.getElementById('cart-float-total').innerText = totalFinal > 0 ? `₡${totalFinal.toLocaleString()}` : "₡0";
            document.getElementById('cart-total').innerText = textoTotal;
            
            const btn = document.getElementById('cart-float-btn');
            totalItems > 0 ? btn.classList.remove('hidden') : btn.classList.add('hidden');

            document.getElementById('cart-items').innerHTML = carrito.map(i => `
                <div class="bg-white p-3 rounded-xl border flex justify-between items-center shadow-sm">
                    <div><h4 class="font-bold text-xs uppercase">${i.n}</h4><p class="text-red-600 font-black">₡${(i.p * i.cantidad).toLocaleString()}</p></div>
                    <div class="flex items-center gap-2"><button onclick="quitarDelCarrito(${i.id})" class="w-8 h-8 bg-gray-100 rounded">-</button><span class="font-bold text-xs">${i.cantidad}</span><button onclick="agregarAlCarrito(${i.id}, '${i.n}', ${i.p})" class="w-8 h-8 bg-gray-100 rounded">+</button></div>
                </div>
            `).join('');
        }

        function enviarPedidoWhatsApp() {
            if (carrito.length === 0) return;
            const direccion = document.getElementById('direccion-manual').value.trim();
            
            if (!direccion && kmDistancia === 0 && !requiereCoordinar) return alert("Por favor indica la dirección o usa el GPS.");
            
            let msg = "¡Hola *Arepas La Karola*! 👋 Mi pedido:\n\n";
            carrito.forEach(i => msg += `▪️ ${i.cantidad}x ${i.n} - ₡${(i.p * i.cantidad).toLocaleString()}\n`);
            
            if (kmDistancia > 0) {
                if (requiereCoordinar) {
                    msg += `\n🚚 *Envío:* El encargado te dirá el costo (${kmDistancia.toFixed(1)} km)`;
                } else {
                    msg += `\n🚚 *Envío:* ₡${costoEnvio.toLocaleString()} (${kmDistancia.toFixed(1)} km)`;
                }
            } else if (requiereCoordinar) {
                msg += `\n🚚 *Envío:* El encargado te dirá el costo`;
            }

            msg += `\n🏠 *Dirección:* ${direccion || "Ubicación GPS compartida"}`;
            
            const subtotal = carrito.reduce((s,i)=>s+(i.p*i.cantidad),0);
            const totalFinal = subtotal + costoEnvio;
            
            msg += `\n\n*Total a pagar: ₡${totalFinal.toLocaleString()}*`;
            if (requiereCoordinar) msg += ` *(+ Costo de envío)*`;
            
            window.open(`https://wa.me/${WHATSAPP_NUM}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function renderCatalogo(items) {
            document.getElementById('catalogo').innerHTML = items.map(item => `
                <div class="card-shred bg-white border-2 shadow-lg flex flex-col h-full rounded-b-lg overflow-hidden">
                    <div class="bg-red-700 h-1.5 w-full"></div>
                    <div class="p-5 flex flex-col flex-grow">
                        <div class="flex justify-between items-start mb-2"><span class="text-blue-700 font-black text-[10px] uppercase bg-blue-50 px-2 py-1 rounded">${item.cat}</span><span class="bg-yellow-100 text-yellow-800 text-[10px] font-black px-2 py-1 rounded italic">${item.c}</span></div>
                        <h3 class="font-bold text-gray-900 text-sm uppercase mb-1">${item.n}</h3>
                        <p class="text-gray-500 text-[11px] italic mb-4 line-clamp-2">"${item.d}"</p>
                        <div class="mt-auto pt-4 flex justify-between items-end border-t border-dashed">
                            <div><p class="text-[9px] text-gray-400 font-bold uppercase tracking-widest">Precio</p><p class="text-2xl font-black text-red-700">₡${item.p.toLocaleString()}</p></div>
                            <button onclick="agregarAlCarrito(${item.id}, '${item.n}', ${item.p})" class="h-12 w-12 rounded-2xl bg-yellow-400 flex items-center justify-center shadow-md active:scale-90 transition-all hover:bg-yellow-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filtrar(cat, btn) {
            renderCatalogo(cat === 'Todas' ? productos : productos.filter(p => p.cat === cat));
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function toggleCart() {
            const m = document.getElementById('cart-modal');
            m.classList.contains('hidden') ? m.classList.replace('hidden', 'flex') : m.classList.replace('flex', 'hidden');
        }

        renderCatalogo(productos);
    </script>
</body>
</html>
